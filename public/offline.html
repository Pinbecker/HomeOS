<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HomeOS — Offline</title>
  <style>
    :root {
      --bg: #F2F2F7;
      --surface: #FFFFFF;
      --text-1: #000000;
      --text-2: rgba(60,60,67,0.60);
      --accent: #007AFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #1C1C1E;
        --text-1: #FFFFFF;
        --text-2: rgba(235,235,245,0.60);
        --accent: #0A84FF;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    .icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: 28px;
    }
    a {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 14px;
      padding: 13px 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>HomeOS needs a connection for most things. Pages you've already visited are still available.</p>
    <a href="/">Go to Home</a>
  </div>
</body>
</html>
